run_name: score-math
wandb_project: SCoRe-Math

model:
  name: unsloth/Qwen3-4B-unsloth-bnb-4bit
  max_seq_length: 12288           # attempt2 prompt (up to ~6k) + new tokens (3k) + headroom
  load_in_4bit: true              # noop for the pre-quantized weights, kept for clarity
  chat_template: ""               # empty = use the tokenizer's built-in template (Qwen3 ships one)
  lora:
    r: 16
    alpha: 16
    dropout: 0.0
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj

dataset:
  name: Sebasdi/math_final_answer
  input_field: problem
  target_field: final_answer_solution
  test_split_size: 200

prompts:
  system: |
    You are an expert math tutor. Reason carefully through each problem,
    then write a clear solution that another mathematician could verify.

    Wrap your final answer in <answer>...</answer> tags. Put only the bare
    answer between the tags — no surrounding prose, no leading "The answer is".

    Examples:
    - <answer>42</answer>
    - <answer>3.14</answer>
    - <answer>-2/3</answer>
    - <answer>y = 2x - 13</answer>
    - <answer>\boxed{x^2 + 1}</answer>

  self_correction: |
    There might be an error in the solution above. Please review the
    reasoning, identify any mistakes, and rewrite the solution.

    Wrap your corrected final answer in <answer>...</answer> tags.

reward:
  fn: exact_match
  answer_extractor: math_final_answer

train:
  batch_size: 2
  learning_rate: 5.0e-6
  stage1_epochs: 1
  stage2_epochs: 1
  beta1: 0.01
  beta2: 0.1
  alpha: 10.0
  max_new_tokens_attempt1: 3000   # Qwen3 thinking emits <think>...</think> before the answer
  max_new_tokens_attempt2: 3000
  max_prompt_length_attempt1: 2000
  max_prompt_length_attempt2: 6000   # attempt2 prompt = attempt1 prompt + full attempt1 output (incl. reasoning) + self-correction
  generation_temperature: 1.0
  seed: 3407

eval:
  batch_size: 1
  max_examples: 200             # set to 0 to skip eval
  generation_temperature: 0.6   # Qwen3 + greedy = infinite loops in thinking mode; >0 required

output:
  dir: outputs                  # adapters saved to {dir}/{run_name}/stage{1,2}/
